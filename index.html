<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Department Recommendation System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: rgba(0,0,0,0.6);
            color: white;
        }

        .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .hidden {
            display: none;
        }

        .about {
            text-align: center;
            color: white;
        }

        .names {
            font-size: 14px;
            margin-top: 20px;
            opacity: 0.8;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>CareBridge</b></div>
    <div class="nav-links">
        <a onclick="showTab('home')">Home</a>
        <a onclick="showTab('about')">About</a>
    </div>
</div>

<!-- HOME -->
<div id="home" class="container">
    <div class="card">
        <h1>Department Recommendation System</h1>

        <!-- Step 1 -->
        <div id="step1">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <button onclick="nextStep(2)">Next</button>
        </div>

        <!-- Step 2 -->
        <div id="step2" class="hidden">
            <label>Age</label>
            <input type="number" id="age">

            <label>Gender</label>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
            </select>

            <button onclick="nextStep(3)">Next</button>
        </div>

        <!-- Step 3 -->
        <div id="step3" class="hidden">
            <label>Symptoms</label>
            <input type="text" id="symptoms" placeholder="e.g. fever, chest pain">

            <button onclick="recommend()">Get Recommendation</button>
        </div>

        <!-- Result -->
        <div id="result" class="result"></div>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="container hidden">
    <div class="about">
        <h1>Department Recommendation System</h1>
        <div class="names">
            <p>Kirpa Gupta</p>
            <p>Team Member 2</p>
            <p>Team Member 3</p>
        </div>
    </div>
</div>

<script>
    function showTab(tab) {
        document.getElementById('home').classList.add('hidden');
        document.getElementById('about').classList.add('hidden');
        document.getElementById(tab).classList.remove('hidden');
    }

    function nextStep(step) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');

        document.getElementById('step' + step).classList.remove('hidden');
    }

    function recommend() {
        let symptoms = document.getElementById('symptoms').value.toLowerCase();
        let result = "";

        if (symptoms.includes("heart") || symptoms.includes("chest")) {
            result = "Recommended Department: Cardiology";
        } else if (symptoms.includes("skin")) {
            result = "Recommended Department: Dermatology";
        } else if (symptoms.includes("fever") || symptoms.includes("cold")) {
            result = "Recommended Department: General Medicine";
        } else if (symptoms.includes("eye")) {
            result = "Recommended Department: Ophthalmology";
        } else {
            result = "Recommended Department: General Physician";
        }

        document.getElementById('result').innerText = result;
    }
</script>

</body>
</html>
